<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiq</title>

    <!--
      tsc only translates TypeScript/JSX syntax into plain JS — it does NOT
      bundle in React itself. The compiled new.js still says
      `import { createRoot } from 'react-dom/client'`, which means nothing
      to a browser on its own. This import map tells the browser exactly
      where those bare module names should actually be fetched from, using
      a feature all modern browsers support natively (no bundler needed).
    -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1"
        }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="module" src="./new.js"></script>
</body>
</html>
